openapi: 3.0.3
info:
  title: FitGenie API
  version: 0.1.0
servers:
  - url: http://localhost:4000
paths:
  /user/profile:
    post:
      summary: Create/update user profile
      responses:
        "200": { description: OK }
  /scan/body:
    post:
      summary: Save body measurements scan
      responses:
        "200": { description: OK }
  /recommendations:
    post:
      summary: Generate AI recommendations
      responses:
        "200": { description: OK }
  /fit-card:
    post:
      summary: Generate fit card
      responses:
        "200": { description: OK }
  /tailors:
    get:
      summary: List tailors/designers
      responses:
        "200": { description: OK }
  /booking:
    post:
      summary: Create booking
      responses:
        "201": { description: Created }
